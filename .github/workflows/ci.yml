name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  # Cheap, JS-only, no native tooling: proves the react-native-builder-bob
  # build pipeline (the actual publish artifact under lib/) succeeds, which
  # `yarn typecheck` alone doesn't guarantee (bob builds against
  # tsconfig.build.json, a different project than the root tsconfig).
  build-library:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  # Reads the survey-core version band from the single source of truth
  # (.github/survey-core-versions.json) and exposes it as a job output so the
  # `test` matrix below can consume it via fromJson(). GitHub Actions matrix
  # strategies can't read the top-level `env:` context directly, so a JSON
  # file + a small setup job is the standard way to keep the band editable in
  # ONE place. To extend the band, edit that file only.
  survey-core-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versions: ${{ steps.load.outputs.versions }}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Load survey-core version band
        id: load
        run: echo "versions=$(jq -c . .github/survey-core-versions.json)" >> "$GITHUB_OUTPUT"

  # survey-core is not yet a devDependency of the library (a later task wires
  # up real usage against the facade) — each matrix leg pins the version
  # under test over the installed tree, then runs the normal unit tests. This
  # is a no-op today and becomes a real compatibility gate once the library
  # imports survey-core.
  test:
    needs: survey-core-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        survey_core_version: ${{ fromJson(needs.survey-core-matrix.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Pin survey-core@${{ matrix.survey_core_version }} for this run
        run: yarn add -D survey-core@${{ matrix.survey_core_version }}

      - name: Run unit tests
        run: yarn test
